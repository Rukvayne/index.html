<!DOCTYPE html>
<html>
<head>
    <title>Campus Alert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
        }

        .input-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
        }

        .alert {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .alert strong {
            display: block;
            margin-bottom: 8px;
            color: black;
            font-size: 16px;
        }

        .time {
            font-size: 12px;
            color: gray;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>📢 Campus Alert</header>

<div class="container">

    <div class="input-box">
        <input type="text" id="alertInput" placeholder="What's happening on campus?">
        <button onclick="postAlert()">Post Alert</button>
    </div>

    <div id="alerts"></div>

</div>

<script>
window.onload = function() {
    let saved = JSON.parse(localStorage.getItem("alerts")) || [];
    saved.forEach(showAlert);
};

function postAlert() {
    let text = document.getElementById("alertInput").value;

    if (text === "") {
        alert("Write something first!");
        return;
    }

    let alertObj = {
        text: text,
        time: new Date().toLocaleTimeString()
    };

    let saved = JSON.parse(localStorage.getItem("alerts")) || [];
    saved.push(alertObj);
    localStorage.setItem("alerts", JSON.stringify(saved));

    showAlert(alertObj);

    document.getElementById("alertInput").value = "";
}

function showAlert(alertObj) {
    let newAlert = document.createElement("div");
    newAlert.className = "alert";

    newAlert.innerHTML = `
        <strong>${alertObj.text}</strong>
        <span class="time">${alertObj.time}</span>
        <br>
        <button class="delete">Delete</button>
    `;

    newAlert.querySelector(".delete").onclick = function() {
        newAlert.remove();
        removeFromStorage(alertObj);
    };

    document.getElementById("alerts").appendChild(newAlert);
}

function removeFromStorage(alertObj) {
    let saved = JSON.parse(localStorage.getItem("alerts")) || [];
    saved = saved.filter(a => a.text !== alertObj.text || a.time !== alertObj.time);
    localStorage.setItem("alerts", JSON.stringify(saved));
}
</script>

</body>
</html>
