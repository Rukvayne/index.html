<!DOCTYPE html>
<html>
<head>
    <title>Campus Alert</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 15px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .alert {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .delete-btn {
            background: red;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<header>📢 Campus Alert</header>

<div class="container">

    <div class="box">
        <input type="text" id="alertInput" placeholder="What's happening on campus?">

        <!-- PASSWORD FIELD -->
        <input type="password" id="adminPass" placeholder="Admin password">

        <select id="category">
            <option>Class</option>
            <option>Exam</option>
            <option>Event</option>
            <option>Emergency</option>
        </select>

        <button onclick="postAlert()">Post Alert</button>
    </div>

    <div id="alerts"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDw7Q997kOOpq-FK4-XDdSVt0ZI4oY-6qg",
  authDomain: "mau-alert-ca318.firebaseapp.com",
  projectId: "mau-alert-ca318"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// POST ALERT (WITH PASSWORD PROTECTION)
function postAlert() {

    let password = document.getElementById("adminPass").value;

    if (password !== "Rukvayne") {   // 🔐 CHANGE THIS PASSWORD
        alert("Not authorized!");
        return;
    }

    let text = document.getElementById("alertInput").value;
    let category = document.getElementById("category").value;

    if (text === "") {
        alert("Write something first!");
        return;
    }

    db.collection("alerts").add({
        text: text,
        category: category,
        time: new Date().toLocaleTimeString()
    }).then(() => {
        loadAlerts();
        document.getElementById("alertInput").value = "";
    });
}

// LOAD ALERTS
function loadAlerts() {
    let container = document.getElementById("alerts");
    container.innerHTML = "";

    db.collection("alerts").get().then(snapshot => {
        let data = [];

        snapshot.forEach(doc => {
            data.push(doc.data());
        });

        let categories = ["Class", "Exam", "Event", "Emergency"];

        categories.forEach(cat => {
            let filtered = data.filter(a => a.category === cat);

            if (filtered.length > 0) {
                let section = document.createElement("div");
                section.innerHTML = `<h3>${cat}</h3>`;

                filtered.forEach(alert => {
                    let div = document.createElement("div");
                    div.className = "alert";
                    div.innerHTML = `
                        <strong>${alert.text}</strong><br>
                        <small>${alert.time}</small>
                        <button class="delete-btn">Delete</button>
                    `;
                    section.appendChild(div);
                });

                container.appendChild(section);
            }
        });
    });
}

// LOAD ON START
window.onload = loadAlerts;
</script>

</body>
</html>
